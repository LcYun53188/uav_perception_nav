local_map_builder:
  ros__parameters:
    frame_id: map
    # nav_stack.launch.py can override this via obstacle_pointcloud_source:
    #   oakd   -> /oakd/points_filtered
    #   mid360 -> /mid360/points
    #   both   -> /perception/obstacle_points
    pointcloud_topic: /oakd/points_filtered
    resolution: 0.5
    width: 40
    height: 40
    min_z: -1.0
    max_z: 2.0
    inflation_radius: 0.5
    publish_rate: 1.0

local_planner:
  ros__parameters:
    forward_speed: 0.5
    repulsion_gain: 2.0
    influence_radius: 3.0
    max_speed: 1.0
    goal_reached_threshold: 0.5

se2_dwa_local_planner:
  ros__parameters:
    control_rate_hz: 20.0
    map_timeout_sec: 1.0
    transform_timeout_sec: 0.1
    base_frame: base_link

    max_vel_x: 0.8
    min_vel_x: -0.1
    max_vel_y: 0.5
    min_vel_y: -0.5
    max_yaw_rate: 0.8

    max_acc_x: 0.5
    max_acc_y: 0.5
    max_yaw_accel: 1.0

    sim_time: 1.2
    sim_dt: 0.1
    vx_samples: 9
    vy_samples: 9
    wz_samples: 11

    robot_radius: 0.35
    obstacle_clearance: 0.25
    slowdown_clearance: 0.8
    stop_clearance: 0.4

    forward_speed: 0.4
    goal_reached_xy: 0.4
    goal_distance_weight: 1.5
    heading_weight: 1.0
    obstacle_weight: 3.0
    velocity_weight: 0.2
    smoothness_weight: 0.5
    yaw_control_mode: face_velocity

safety_monitor:
  ros__parameters:
    # Overridden by nav_stack.launch.py to match local_map_builder's obstacle cloud.
    pointcloud_topic: /oakd/points_filtered
    min_points_threshold: 10

px4_comm_bridge:
  ros__parameters:
    enable_data_bridge: true
    enable_control_bridge: true
    planner_cmd_topic: /nav/cmd_vel
    planner_emergency_topic: /nav/emergency
    planner_safety_topic: /nav/safety_status
    fmu_offboard_mode_topic: /fmu/in/offboard_control_mode
    fmu_trajectory_topic: /fmu/in/trajectory_setpoint
    fmu_command_topic: /fmu/in/vehicle_command
    control_rate_hz: 20.0
    input_velocity_frame: enu
    auto_arm: false
    emergency_action: land
    cmd_timeout_sec: 0.5
    target_system: 1
    target_component: 1
