ekf_filter_node:
  ros__parameters:
    # Coordinate frames
    # -----------------
    # base_link_frame: Represents the center of the UAV (Flight Controller / FCU).
    #
    # Crucial Calibration Note for Camera-FCU Spatial Relationship:
    # 1. ROS 2 TF Frame: Publish a static TF (base_link -> oakd_imu_link) for physical offset [dx, dy, dz] (ENU: X-forward, Y-left, Z-up).
    # 2. PX4 Autopilot EKF2 Lever Arm Parameters:
    #    You MUST set the camera offset in QGC parameters in NED coordinate (X-forward, Y-right, Z-down) to avoid lever-arm drift:
    #      - EKF2_EV_POS_X = dx
    #      - EKF2_EV_POS_Y = -dy
    #      - EKF2_EV_POS_Z = -dz
    # -----------------
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: map
    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: false
    publish_tf: true
    imu0: /px4/imu
    imu0_config:
      - false  # x
      - false  # y
      - false  # z
      - true   # roll
      - true   # pitch
      - true   # yaw
      - false  # vx
      - false  # vy
      - false  # vz
      - true   # vroll
      - true   # vpitch
      - true   # vyaw
      - false  # ax
      - false  # ay
      - false  # az
    imu0_remove_gravitational_acceleration: true
    imu0_nodelay: true
    imu0_queue_size: 10
    odom0: /vio/odometry
    odom0_config:
      - true   # x
      - true   # y
      - true   # z
      - false  # roll
      - false  # pitch
      - true   # yaw
      - true   # vx
      - true   # vy
      - true   # vz
      - false  # vroll
      - false  # vpitch
      - false  # vyaw
      - false  # ax
      - false  # ay
      - false  # az
    odom0_nodelay: true
    odom0_queue_size: 10
    process_noise_covariance:
