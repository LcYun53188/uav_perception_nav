local_map_builder:
  ros__parameters:
    frame_id: map
    pointcloud_topic: /oakd/points_filtered
    resolution: 0.5
    width: 40
    height: 40
    min_z: -1.0
    max_z: 2.0
    inflation_radius: 0.5
    publish_rate: 1.0

local_planner:
  ros__parameters:
    forward_speed: 0.5
    repulsion_gain: 2.0
    influence_radius: 3.0
    max_speed: 1.0
    goal_reached_threshold: 0.5

safety_monitor:
  ros__parameters:
    min_points_threshold: 10

px4_comm_bridge:
  ros__parameters:
    enable_data_bridge: true
    enable_control_bridge: true
    planner_cmd_topic: /nav/cmd_vel
    planner_emergency_topic: /nav/emergency
    planner_safety_topic: /nav/safety_status
    fmu_offboard_mode_topic: /fmu/in/offboard_control_mode
    fmu_trajectory_topic: /fmu/in/trajectory_setpoint
    fmu_command_topic: /fmu/in/vehicle_command
    control_rate_hz: 20.0
    input_velocity_frame: enu
    auto_arm: false
    emergency_action: land
    cmd_timeout_sec: 0.5
    target_system: 1
    target_component: 1