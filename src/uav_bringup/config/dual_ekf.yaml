# ─────────────────────────────────────────────────────
# NavSat Transform: GPS (WGS84) → 局部 ENU 里程计
# ─────────────────────────────────────────────────────
navsat_transform:
  ros__parameters:
    frequency: 30.0
    delay: 3.0

    # 当地磁偏角（弧度）— 飞行前请根据实际地点设置
    # 查询: https://www.ngdc.noaa.gov/geomag-web/
    magnetic_declination_radians: 0.0

    # 如果 IMU 零点朝北而非朝东，设为 π/2
    yaw_offset: 0.0

    # UAV 需要高度信息
    zero_altitude: false

    # 广播 GPS 笛卡尔坐标系变换
    broadcast_cartesian_transform: true
    broadcast_cartesian_transform_as_parent_frame: false

    # 发布融合后的 GPS 坐标
    publish_filtered_gps: true

    # 使用 EKF 融合后的航向（而非磁力计），更可靠
    use_odometry_yaw: true

    wait_for_datum: false
