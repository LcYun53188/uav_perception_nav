ekf_filter_node:
  ros__parameters:
    # Coordinate frames
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: map

    # Parameters
    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: false
    transform_time_offset: 0.0
    transform_timeout: 0.0
    print_diagnostics: true
    debug: false
    publish_tf: true
    publish_acceleration: false

    # Initial state
    use_control: false

    # Subscriber settings
    imu0: /imu
    imu0_config:
      - false  # x
      - false  # y
      - false  # z
      - true   # roll
      - true   # pitch
      - true   # yaw
      - false  # vx
      - false  # vy
      - false  # vz
      - true   # vroll
      - true   # vpitch
      - true   # vyaw
      - false  # ax
      - false  # ay
      - false  # az
    imu0_remove_gravitational_acceleration: true
    imu0_nodelay: true
    imu0_relative: false
    imu0_queue_size: 10

    # Optional VIO odometry (vision-based)
    odom0: /vio/odometry
    odom0_config:
      - true   # x
      - true   # y
      - true   # z
      - false  # roll
      - false  # pitch
      - true   # yaw
      - true   # vx
      - true   # vy
      - true   # vz
      - false  # vroll
      - false  # vpitch
      - false  # vyaw
      - false  # ax
      - false  # ay
      - false  # az
    odom0_nodelay: true
    odom0_relative: false
    odom0_queue_size: 10
    odom0_differential: false

    # Optional PX4 odometry (uncomment to enable)
    # odom1: /px4/vehicle_odometry
    # odom1_config:
    #   - true   # x
    #   - true   # y
    #   - true   # z
    #   - true   # roll
    #   - true   # pitch
    #   - true   # yaw
    #   - true   # vx
    #   - true   # vy
    #   - true   # vz
    #   - true   # vroll
    #   - true   # vpitch
    #   - true   # vyaw
    #   - false  # ax
    #   - false  # ay
    #   - false  # az
    # odom1_nodelay: true
    # odom1_relative: false
    # odom1_queue_size: 10
    # odom1_differential: false

