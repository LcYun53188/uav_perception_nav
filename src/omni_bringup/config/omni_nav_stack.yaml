local_map_builder:
  ros__parameters:
    frame_id: map
    pointcloud_topic: /oakd/points_filtered
    resolution: 0.05
    width: 240
    height: 240
    min_z: 0.05
    max_z: 1.2
    inflation_radius: 0.35
    publish_rate: 5.0

se2_dwa_local_planner:
  ros__parameters:
    control_rate_hz: 20.0
    map_timeout_sec: 1.0
    transform_timeout_sec: 0.1
    base_frame: base_link

    max_vel_x: 0.6
    min_vel_x: -0.3
    max_vel_y: 0.6
    min_vel_y: -0.6
    max_yaw_rate: 1.0

    max_acc_x: 0.4
    max_acc_y: 0.4
    max_yaw_accel: 1.2

    sim_time: 1.0
    sim_dt: 0.1
    vx_samples: 9
    vy_samples: 9
    wz_samples: 11

    robot_radius: 0.32
    obstacle_clearance: 0.2
    slowdown_clearance: 0.7
    stop_clearance: 0.3

    forward_speed: 0.35
    goal_reached_xy: 0.25
    goal_distance_weight: 1.5
    heading_weight: 0.8
    obstacle_weight: 3.0
    velocity_weight: 0.25
    smoothness_weight: 0.6
    yaw_control_mode: face_velocity

safety_monitor:
  ros__parameters:
    pointcloud_topic: /oakd/points_filtered
    min_points_threshold: 10
