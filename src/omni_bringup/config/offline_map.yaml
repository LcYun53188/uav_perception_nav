offline_map_server:
  ros__parameters:
    yaml_filename: ""
    frame_id: map
    topic_name: map
    use_sim_time: false

    # Map YAML values can override these. Keep conservative defaults here so
    # imported low-resolution maps behave predictably when thresholds are absent.
    occupied_thresh: 0.65
    free_thresh: 0.25
    negate: false

offline_map_lifecycle_manager:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - offline_map_server
