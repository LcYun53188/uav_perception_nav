# OAK-D IMU raw 配置 - 通用模式
oakd_imu_node:
  ros__parameters:
    # IMU采样频率 (Hz 200-400)
    imu_frequency: 400
    
    # 原始 IMU 输出话题
    topic_name: '/oakd/imu/raw'
    
    # IMU frame_id
    frame_id: 'oakd_imu_link'
    
    # 陀螺仪量程
    # 选项: 'gyroscope_250_dps', 'gyroscope_500_dps', 'gyroscope_1000_dps', 'gyroscope_2000_dps'
    gyro_full_scale: 'gyroscope_2000_dps'
    
    # 加速度计量程
    # 选项: 'accelerometer_2g', 'accelerometer_4g', 'accelerometer_8g', 'accelerometer_16g'
    accel_full_scale: 'accelerometer_4g'
