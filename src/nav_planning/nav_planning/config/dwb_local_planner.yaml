# DWB (Dynamic Window Approach) 本地规划器配置
# 为OAK-D (400Hz IMU + 20Hz 深度) + PX4 (100Hz offboard) 优化
#
# 文献: [1] D. V. Dinh, "Real-time Obstacle Avoidance in Crowded Scenarios", 2013 IEEE ICRA
#
# 更新规则:
#   - 避碰过度 → ↓ occdist_scale (0.02 → 0.01)
#   - 转向不足 → ↑ goal_distance_bias (24.0 → 32.0)
#   - 路径抖动 → ↓ samples (20 → 15)
#   - 延迟问题 → ↓ sim_time (1.0 → 0.5s)

DWBLocalPlanner:
  # ════════════════════════════════════════════════════════════════════
  # 速度限制 [m/s, rad/s]
  # ════════════════════════════════════════════════════════════════════
  # 说明: OAK-D + PX4 的稳定速度范围为 0.5-2.0 m/s
  #       反应延迟约 80-100ms（感知 + 规划 + 控制）
  #
  min_vel_x: -0.1          # 后退最小速度 (保守模式)
  max_vel_x: 2.0           # 前进最大速度
  min_vel_y: -1.0          # 左移最小速度
  max_vel_y: 1.0           # 右移最大速度
  min_vel_theta: -1.57     # 逆时针最小角速度 (-π/2)
  max_vel_theta: 1.57      # 逆时针最大角速度 (+π/2)

  # ════════════════════════════════════════════════════════════════════
  # 加速度限制 [m/s², rad/s²]
  # ════════════════════════════════════════════════════════════════════
  # 与 PX4 INAV 加速度对齐 (default: 9.81 m/s²)
  # 保守设置以确保平台稳定性
  #
  acc_lim_x: 0.5           # 前向加速度限制
  acc_lim_y: 0.5           # 侧向加速度限制
  acc_lim_theta: 1.0       # 旋转加速度限制

  decel_lim_x: 0.8         # 减速限制 (可大于加速限制)
  decel_lim_y: 0.8
  decel_lim_theta: 1.57

  # ════════════════════════════════════════════════════════════════════
  # 采样配置 (轨迹评估点数)
  # ════════════════════════════════════════════════════════════════════
  # 说明: 更多采样 = 更好的避障但计算负荷↑
  #       对于 400MHz 普通CPU，20×5×20=2000 评估点可接受 (<50ms)
  #
  vx_samples: 20           # 线速度采样数
  vy_samples: 5            # Y轴采样数 (通常较少，优先前向)
  vtheta_samples: 20       # 旋转采样数

  # ════════════════════════════════════════════════════════════════════
  # 模拟与评估参数
  # ════════════════════════════════════════════════════════════════════
  # 说明: 模拟时间越长，避碰预见性越好，但延迟↑
  #       对于OAK-D延迟 80-100ms，建议 sim_time=0.8-1.0s
  #
  sim_time: 1.0            # 前向模拟时间 [s]
  sim_granularity: 0.05    # 轨迹采样粒度 [m]
  angular_sim_granularity: 0.025  # 旋转采样粒度 [rad]

  # ════════════════════════════════════════════════════════════════════
  # 评估函数权重 (DWB核心调参)
  # ════════════════════════════════════════════════════════════════════
  # 总得分 = path_score × path_distance_bias
  #        + goal_score × goal_distance_bias
  #        + occ_score  × occdist_scale
  #        + (1 - align_heading) × heading_cost_scale
  #
  # [策略]
  #   - 如果机器人在直线上卡住：↑ path_distance_bias
  #   - 如果转向僵硬：↑ goal_distance_bias
  #   - 如果碰撞过频：↑ occdist_scale
  #   - 如果避碰过度：↓ occdist_scale
  #
  path_distance_bias: 32.0        # 路径跟踪权重
  goal_distance_bias: 24.0        # 目标指向权重
  occdist_scale: 0.02             # 障碍避开权重 (保守)
  heading_lookahead: 0.325        # 目标方向前视距离 [m]

  # ════════════════════════════════════════════════════════════════════
  # 高级参数
  # ════════════════════════════════════════════════════════════════════
  prune_plan: true                # 清理已通过的轨迹段
  publish_cost_grid_pc: false     # 发布costmap点云 (调试用，关闭可提速)

  # ════════════════════════════════════════════════════════════════════
  # 轨迹评估器配置
  # ════════════════════════════════════════════════════════════════════
  # 说明: critic_scale 定义各评估器的权重平衡
  #
  critics:
    - FollowPath                  # 跟踪参考轨迹
    - GoalAlign                   # 朝向目标
    - GoalDist                    # 靠近目标
    - ObstacleFootprint           # 避碰 (轮廓)
    - OscillationPrevention       # 防止抖动
    - PathAlign                   # 对齐路径方向
    - PathDist                    # 跟踪路径距离
    - RotateToGoal                # 旋转对齐

  critic_scales:
    FollowPath: 0.0              # 无参考路径时关闭
    GoalAlign: 0.0               # 默认关闭
    GoalDist: 1.0
    ObstacleFootprint: 1.0
    OscillationPrevention: 1.0
    PathAlign: 0.0
    PathDist: 1.0
    RotateToGoal: 0.0

  # ════════════════════════════════════════════════════════════════════
  # 二阶动力学模型参数
  # ════════════════════════════════════════════════════════════════════
  # 说明: 如果启用 use_dwa，会考虑速度约束
  #       对于延迟性系统有帮助
  #
  use_dwa: false
  collision_checker: footprint
  footprint_model: {type: circular, radius: 0.3}  # 机器人轮廓半径

  # ════════════════════════════════════════════════════════════════════
  # 代价函数配置
  # ════════════════════════════════════════════════════════════════════
  transform_tolerance: 0.2
  robot_vel_tf_frame_id: base_link
  cost_function_type: 2D
