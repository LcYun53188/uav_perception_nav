ground_serial_bridge:
  ros__parameters:
    planner_cmd_topic: /nav/cmd_vel
    planner_emergency_topic: /nav/emergency
    planner_safety_topic: /nav/safety_status
    command_output_frame: base_link
    transform_cmd_to_output_frame: true
    transform_timeout_sec: 0.05
    # base_link: send body-frame velocity to the MCU.
    # mcu_world: rotate body-frame velocity into the MCU drifting world frame
    #            using yaw_rad from the status frame.
    mcu_velocity_frame: base_link
    mcu_yaw_sign: 1.0
    mcu_yaw_offset_rad: 0.0
    mcu_yaw_auto_zero: false
    # yaw_error: compensate only yaw_mcu - yaw_base, where yaw_base comes from TF.
    # mcu_yaw: use the MCU yaw directly for body->MCU-world rotation.
    mcu_yaw_reference_frame: odom
    mcu_yaw_compensation_mode: yaw_error
    require_mcu_yaw_for_mcu_world: true

    serial_port: /dev/ttyUSB0
    baudrate: 115200
    serial_timeout_sec: 0.02
    reconnect_interval_sec: 1.0

    control_rate_hz: 20.0
    cmd_timeout_sec: 0.5
    require_feedback: false
    min_feedback_rate_hz: 10.0
    feedback_timeout_sec: 0.3

    max_vel_x: 0.6
    max_vel_y: 0.6
    max_yaw_rate: 1.0
    max_acc_x: 0.4
    max_acc_y: 0.4
    max_yaw_accel: 1.2
